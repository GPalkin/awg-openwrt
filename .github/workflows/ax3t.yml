name: Build AX3000T AmneziaWG OpenWrt 24.10.6

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    name: Build AmneziaWG for Xiaomi AX3000T / OpenWrt 24.10.6
    runs-on: ubuntu-22.04

    env:
      OPENWRT_VERSION: 24.10.6
      OPENWRT_TARGET: mediatek
      OPENWRT_SUBTARGET: filogic
      OPENWRT_ARCH: aarch64_cortex-a53
      SDK_URL: https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/filogic/openwrt-sdk-24.10.6-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-distutils \
            python3-setuptools \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            ccache \
            jq \
            zstd

      - name: Download OpenWrt SDK
        run: |
          mkdir -p /tmp/openwrt-sdk
          cd /tmp/openwrt-sdk
          wget -O sdk.tar.zst "$SDK_URL"
          tar --use-compress-program=unzstd -xf sdk.tar.zst --strip-components=1

      - name: Register current repository as OpenWrt feed
        run: |
          cd /tmp/openwrt-sdk
          echo "src-link awg $GITHUB_WORKSPACE" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Show available AmneziaWG packages
        run: |
          cd /tmp/openwrt-sdk
          find package feeds -iname "*amnezia*" -o -iname "*awg*" -o -iname "*wireguard*" | sort

      - name: Configure SDK
        run: |
          cd /tmp/openwrt-sdk
          make defconfig

      - name: Build AmneziaWG packages
        run: |
          cd /tmp/openwrt-sdk

          make package/amneziawg-tools/compile V=s || true
          make package/kmod-amneziawg/compile V=s || true
          make package/amneziawg/compile V=s || true
          make package/luci-app-amneziawg/compile V=s || true

      - name: Collect IPK packages
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts"

          find /tmp/openwrt-sdk/bin/packages -name "*.ipk" | sort | tee "$GITHUB_WORKSPACE/artifacts/ipk-list.txt"
          find /tmp/openwrt-sdk/bin/targets -name "*.ipk" | sort | tee -a "$GITHUB_WORKSPACE/artifacts/ipk-list.txt"

          find /tmp/openwrt-sdk/bin/packages -name "*amnezia*.ipk" -exec cp -v {} "$GITHUB_WORKSPACE/artifacts/" \; || true
          find /tmp/openwrt-sdk/bin/packages -name "*awg*.ipk" -exec cp -v {} "$GITHUB_WORKSPACE/artifacts/" \; || true
          find /tmp/openwrt-sdk/bin/targets -name "*amnezia*.ipk" -exec cp -v {} "$GITHUB_WORKSPACE/artifacts/" \; || true
          find /tmp/openwrt-sdk/bin/targets -name "*awg*.ipk" -exec cp -v {} "$GITHUB_WORKSPACE/artifacts/" \; || true

          echo "Collected files:"
          ls -lah "$GITHUB_WORKSPACE/artifacts"

          test -n "$(find "$GITHUB_WORKSPACE/artifacts" -name "*.ipk" -print -quit)"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ax3000t-amneziawg-openwrt-24.10.6
          path: artifacts/
